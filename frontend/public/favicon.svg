<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Deep dark glassmorphism background block -->
  <rect x="0" y="0" width="120" height="120" rx="30" fill="#030712" />
  
  <!-- Peer Nodes -->
  <circle cx="45" cy="45" r="15" fill="none" stroke="url(#neon)" stroke-width="8" filter="url(#glow)"/>
  <circle cx="75" cy="75" r="15" fill="none" stroke="url(#neon)" stroke-width="8" filter="url(#glow)"/>
  
  <!-- High-speed neon data link -->
  <path d="M 50 50 L 60 40 L 60 80 L 70 70" fill="none" stroke="url(#neon)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>